<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>스크린골프 내기 정산</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green-dark: #1a3a2a;
    --green-mid: #2d5a3d;
    --green-light: #4a8c5c;
    --green-bright: #5cb87a;
    --gold: #d4a843;
    --gold-light: #f0c96a;
    --cream: #f5f0e8;
    --cream-dark: #e8e0d0;
    --sand: #c8b89a;
    --text-dark: #1a1a1a;
    --text-mid: #4a4a4a;
    --text-light: #888;
    --white: #ffffff;
    --red: #c0392b;
    --red-light: #e74c3c;
    --blue: #2980b9;
    --shadow: 0 4px 20px rgba(0,0,0,0.15);
    --shadow-heavy: 0 8px 40px rgba(0,0,0,0.25);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--green-dark);
    color: var(--text-dark);
    min-height: 100vh;
    overflow-x: hidden;
    overscroll-behavior-y: none;
  }

  /* 골프 코스 잔디 배경 */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% 100%, rgba(74,140,92,0.3) 0%, transparent 70%),
      repeating-linear-gradient(
        90deg,
        transparent,
        transparent 40px,
        rgba(255,255,255,0.01) 40px,
        rgba(255,255,255,0.01) 80px
      );
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── 헤더 ── */
  .app-header {
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
    border-bottom: 2px solid var(--gold);
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .logo {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 20px;
    color: var(--gold);
    letter-spacing: -0.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-icon { font-size: 22px; }

  .header-actions { display: flex; gap: 8px; }

  /* ── 탭 네비 ── */
  .tab-nav {
    background: rgba(26,58,42,0.95);
    display: flex;
    border-bottom: 1px solid rgba(212,168,67,0.3);
    overflow-x: auto;
    scrollbar-width: none;
  }
  .tab-nav::-webkit-scrollbar { display: none; }

  .tab-btn {
    flex: 1;
    min-width: 80px;
    padding: 12px 8px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.5);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    white-space: nowrap;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
  }
  .tab-btn .tab-icon { font-size: 16px; }
  .tab-btn.active {
    color: var(--gold);
  }
  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 10%;
    width: 80%;
    height: 2px;
    background: var(--gold);
    border-radius: 2px 2px 0 0;
  }

  /* ── 메인 컨텐츠 ── */
  .main-content {
    flex: 1;
    padding: 16px;
    background: var(--cream);
    border-radius: 20px 20px 0 0;
    margin-top: 4px;
    min-height: calc(100vh - 130px);
  }

  /* ── 섹션 헤더 ── */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .section-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 18px;
    color: var(--green-dark);
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* ── 버튼 ── */
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 10px 18px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .btn:active { transform: scale(0.97); }

  .btn-primary {
    background: linear-gradient(135deg, var(--green-mid), var(--green-light));
    color: white;
    box-shadow: 0 3px 10px rgba(45,90,61,0.4);
  }
  .btn-primary:hover { background: linear-gradient(135deg, var(--green-light), var(--green-bright)); }

  .btn-gold {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--green-dark);
    font-weight: 700;
    box-shadow: 0 3px 10px rgba(212,168,67,0.4);
  }

  .btn-outline {
    background: transparent;
    border: 1.5px solid var(--green-mid);
    color: var(--green-mid);
  }

  .btn-danger {
    background: var(--red-light);
    color: white;
  }

  .btn-sm {
    padding: 6px 12px;
    font-size: 12px;
  }

  .btn-icon {
    width: 36px;
    height: 36px;
    padding: 0;
    border-radius: 50%;
    font-size: 16px;
  }

  .btn-full { width: 100%; }

  /* ── 카드 ── */
  .card {
    background: white;
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: var(--shadow);
    margin-bottom: 12px;
  }
  .card-green {
    background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
    color: white;
  }
  .card-gold {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--green-dark);
  }

  /* ── 인풋 ── */
  .input-group { margin-bottom: 14px; }
  .input-label {
    display: block;
    font-size: 12px;
    font-weight: 700;
    color: var(--text-mid);
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .input-field {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--cream-dark);
    border-radius: var(--radius-sm);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 15px;
    color: var(--text-dark);
    background: white;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .input-field:focus {
    outline: none;
    border-color: var(--green-light);
    box-shadow: 0 0 0 3px rgba(74,140,92,0.15);
  }
  .input-number {
    text-align: center;
    font-weight: 700;
    font-size: 18px;
    width: 70px;
    padding: 8px;
  }

  /* ── 플레이어 칩 ── */
  .player-chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px; }
  .player-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 14px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    border: 2px solid transparent;
  }
  .player-chip.selected {
    color: white;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .player-chip.unselected {
    background: var(--cream-dark);
    color: var(--text-mid);
  }
  .chip-remove {
    width: 16px; height: 16px;
    border-radius: 50%;
    background: rgba(0,0,0,0.15);
    border: none;
    color: inherit;
    font-size: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    line-height: 1;
    padding: 0;
  }

  /* ── 플레이어 색상 ── */
  .pc-0 { background: #2ecc71; border-color: #27ae60; }
  .pc-1 { background: #3498db; border-color: #2980b9; }
  .pc-2 { background: #e74c3c; border-color: #c0392b; }
  .pc-3 { background: #9b59b6; border-color: #8e44ad; }
  .pc-bg-0 { background: rgba(46,204,113,0.12); border-color: #2ecc71; color: #27ae60; }
  .pc-bg-1 { background: rgba(52,152,219,0.12); border-color: #3498db; color: #2980b9; }
  .pc-bg-2 { background: rgba(231,76,60,0.12); border-color: #e74c3c; color: #c0392b; }
  .pc-bg-3 { background: rgba(155,89,182,0.12); border-color: #9b59b6; color: #8e44ad; }

  /* ── 경기 카드 ── */
  .match-card {
    background: white;
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--shadow);
    margin-bottom: 12px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .match-card:active { transform: scale(0.99); box-shadow: var(--shadow-heavy); }
  .match-card-header {
    background: linear-gradient(135deg, var(--green-dark), var(--green-mid));
    padding: 14px 16px;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .match-title { font-family: 'Black Han Sans', sans-serif; font-size: 16px; color: var(--gold); }
  .match-date { font-size: 11px; color: rgba(255,255,255,0.6); margin-top: 2px; }
  .match-status {
    font-size: 11px;
    padding: 3px 8px;
    border-radius: 10px;
    font-weight: 700;
  }
  .status-ongoing { background: var(--gold); color: var(--green-dark); }
  .status-done { background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.7); }
  .match-card-body { padding: 14px 16px; }
  .match-players { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .match-info-row { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-light); }

  /* ── 스코어카드 ── */
  .scorecard-wrapper {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }
  .scorecard {
    width: 100%;
    min-width: 500px;
    border-collapse: collapse;
    background: white;
    font-size: 13px;
  }
  .scorecard th {
    background: var(--green-dark);
    color: white;
    padding: 10px 8px;
    text-align: center;
    font-weight: 500;
    font-size: 12px;
    position: sticky;
    top: 0;
  }
  .scorecard th.player-col { background: var(--green-mid); }
  .scorecard td {
    padding: 8px 6px;
    text-align: center;
    border-bottom: 1px solid var(--cream-dark);
    border-right: 1px solid var(--cream-dark);
  }
  .scorecard tr:last-child td { border-bottom: none; }
  .scorecard td.player-name {
    background: var(--cream);
    font-weight: 600;
    font-size: 12px;
    text-align: left;
    padding-left: 10px;
    min-width: 70px;
    position: sticky;
    left: 0;
    z-index: 1;
  }
  .score-input-cell {
    padding: 3px 1px;
  }
  .score-stepper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1px;
  }
  .score-stepper-btn {
    width: 32px;
    height: 18px;
    border: none;
    background: var(--cream-dark);
    border-radius: 4px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    color: var(--text-mid);
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s;
  }
  .score-stepper-btn:active {
    background: var(--green-light);
    color: white;
  }
  .score-stepper-val {
    font-size: 16px;
    font-weight: 700;
    min-width: 32px;
    text-align: center;
    line-height: 1.5;
    font-family: 'Noto Sans KR', sans-serif;
  }
  /* ── 홀별 입력 모드 ── */
  .hole-input-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .hole-nav-btn {
    width: 44px; height: 44px;
    border: none; border-radius: 50%;
    background: rgba(255,255,255,0.15);
    color: white; font-size: 20px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .hole-nav-btn:active { background: var(--gold); }
  .hole-nav-btn:disabled { opacity: 0.25; pointer-events: none; }
  .hole-number-display {
    text-align: center;
  }
  .hole-number-display .hole-num-big {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 38px; color: white; line-height: 1;
  }
  .hole-number-display .hole-par-label {
    font-size: 13px; color: var(--gold-light); margin-top: 2px;
  }
  .hole-progress-dots {
    display: flex; gap: 3px; justify-content: center; margin-bottom: 14px; flex-wrap: wrap; padding: 0 4px;
  }
  .hole-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(255,255,255,0.2);
    transition: background 0.15s;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .hole-dot.adjusted { background: var(--gold); }
  .hole-dot.current  { background: white; box-shadow: 0 0 0 2px var(--gold); }
  .player-score-row {
    background: white; border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: flex; align-items: center; gap: 14px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .player-score-row .ps-info { flex: 1; min-width: 0; }
  .player-score-row .ps-name {
    font-weight: 700; font-size: 15px; color: var(--text-dark);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .player-score-row .ps-rel {
    font-size: 12px; margin-top: 2px;
  }
  .big-stepper {
    display: flex; align-items: center; gap: 0; flex-shrink: 0;
  }
  .big-stepper-btn {
    width: 52px; height: 52px;
    border: none; border-radius: 12px;
    font-size: 26px; font-weight: 700;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    background: var(--cream-dark); color: var(--text-mid);
    -webkit-tap-highlight-color: transparent;
    transition: background 0.1s, transform 0.08s;
    user-select: none;
  }
  .big-stepper-btn:active { transform: scale(0.92); }
  .big-stepper-val {
    width: 56px; text-align: center;
    font-size: 28px; font-weight: 900;
    font-family: 'Black Han Sans', sans-serif;
    line-height: 1;
  }
  .hole-action-bar {
    display: flex; gap: 10px; margin-top: 4px;
  }
  .score-winner { background: rgba(212,168,67,0.2) !important; }
  .score-cell {
    font-weight: 700;
    font-size: 15px;
  }
  .total-col { background: var(--cream); font-weight: 700; }

  /* ── 결과 카드 ── */
  .result-player-card {
    background: white;
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 10px;
    box-shadow: var(--shadow);
    display: flex;
    align-items: center;
    gap: 14px;
    position: relative;
    overflow: hidden;
  }
  .result-rank {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 28px;
    color: var(--cream-dark);
    min-width: 36px;
    text-align: center;
  }
  .result-rank.rank-1 { color: var(--gold); }
  .result-rank.rank-2 { color: var(--sand); }
  .result-rank.rank-3 { color: #cd7f32; }
  .result-player-info { flex: 1; }
  .result-player-name {
    font-weight: 700;
    font-size: 16px;
    margin-bottom: 4px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .result-player-score { font-size: 13px; color: var(--text-light); }
  .result-amount {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 22px;
    text-align: right;
  }
  .amount-plus { color: var(--green-light); }
  .amount-minus { color: var(--red-light); }
  .amount-zero { color: var(--text-light); }

  /* ── 홀별 결과 ── */
  .hole-result-row {
    display: flex;
    align-items: center;
    padding: 10px 14px;
    border-bottom: 1px solid var(--cream-dark);
    gap: 10px;
  }
  .hole-result-row:last-child { border-bottom: none; }
  .hole-num {
    width: 32px; height: 32px;
    background: var(--green-dark);
    color: white;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .hole-winner-badge {
    display: flex; align-items: center; gap: 4px;
    font-size: 13px; font-weight: 600;
  }
  .hole-scores { display: flex; gap: 6px; flex-wrap: wrap; margin-left: auto; }
  .hole-score-badge {
    font-size: 12px;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 600;
  }
  .hole-amount { font-weight: 700; font-size: 13px; color: var(--gold); white-space: nowrap; }

  /* ── 설정 ── */
  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 0;
    border-bottom: 1px solid var(--cream-dark);
  }
  .setting-row:last-child { border-bottom: none; }
  .setting-label { font-size: 14px; font-weight: 600; color: var(--text-dark); }
  .setting-desc { font-size: 11px; color: var(--text-light); margin-top: 2px; }

  /* ── 토글 스위치 ── */
  .toggle-wrapper { display: flex; gap: 4px; }
  .toggle-btn {
    padding: 6px 12px;
    border: 1.5px solid var(--cream-dark);
    border-radius: 20px;
    background: white;
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--text-mid);
  }
  .toggle-btn.active {
    background: var(--green-mid);
    border-color: var(--green-mid);
    color: white;
    font-weight: 700;
  }

  /* ── 모달 ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 200;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    backdrop-filter: blur(2px);
    animation: fadeIn 0.15s;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .modal-sheet {
    background: var(--cream);
    border-radius: 20px 20px 0 0;
    padding: 20px;
    width: 100%;
    max-width: 480px;
    max-height: 85vh;
    overflow-y: auto;
    animation: slideUp 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-handle {
    width: 40px; height: 4px;
    background: var(--sand);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .modal-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 20px;
    color: var(--green-dark);
    margin-bottom: 16px;
  }

  /* ── 토스트 ── */
  .toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--green-dark);
    color: white;
    padding: 12px 20px;
    border-radius: 30px;
    font-size: 14px;
    font-weight: 500;
    z-index: 999;
    box-shadow: var(--shadow-heavy);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
    border: 1px solid var(--gold);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ── 빈 상태 ── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-title { font-size: 16px; font-weight: 600; color: var(--text-mid); margin-bottom: 6px; }
  .empty-desc { font-size: 13px; line-height: 1.6; }

  /* ── 뱃지 ── */
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
  }
  .badge-gold { background: rgba(212,168,67,0.15); color: #9a7000; border: 1px solid var(--gold); }

  /* ── 핀치/터치 ── */
  .touch-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  /* ── 스핀어 ── */
  .number-stepper {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .stepper-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid var(--green-mid);
    background: white;
    color: var(--green-mid);

<script>
// ================================================================
// 데이터 구조 & 상태
// ================================================================
const APP_VERSION = 'v2.1.6';

const PLAYER_COLORS = ['pc-0','pc-1','pc-2','pc-3'];
const PLAYER_BG_COLORS = ['pc-bg-0','pc-bg-1','pc-bg-2','pc-bg-3'];
const COLOR_HEX = ['#2ecc71','#3498db','#e74c3c','#9b59b6'];
const PAR_DEFAULT = [4,4,3,4,5,3,4,5,4, 4,4,3,5,4,4,3,5,4]; // 파72 기본

let state = loadState() || {
  players: [],
  matches: [],
  settings: {
    betMode: 'diff',
    baseAmount: 1000,
    skinCarryover: true,
    par: [...PAR_DEFAULT]
  },
  activeMatchId: null,
  activeHole: 0,        // 현재 입력 중인 홀 인덱스 (0-17)
  currentTab: 'matches'
};

function saveState() {
  try { localStorage.setItem('sgApp', JSON.stringify(state)); } catch(e) {}
}
function loadState() {
  try {
    const s = localStorage.getItem('sgApp');
    return s ? JSON.parse(s) : null;
  } catch(e) { return null; }
}

// ================================================================
// 계산 로직
// ================================================================

/** 홀 배율 계산 (스킨 모드 / 뱃지용) */
function calcHoleMultiplier(match, h, holeScores) {
  const birdieBonus = match.bettingRule?.birdieBonus ?? false;
  const doubleParBonus = match.bettingRule?.doubleParBonus ?? false;
  if (!birdieBonus && !doubleParBonus) return 1;
  const par = state.settings.par[h];
  const birdieExempt = match.bettingRule?.birdieExempt ?? [];
  const doubleParExempt = match.bettingRule?.doubleParExempt ?? [];
  let mult = 1;
  if (birdieBonus && holeScores.filter(s => !birdieExempt.includes(s.pid)).some(s => s.score <= par - 1)) mult++;
  if (doubleParBonus && holeScores.filter(s => !doubleParExempt.includes(s.pid)).some(s => s.score >= par * 2)) mult++;
  return mult;
}

/** 페어별 배율: 주는 사람 기준으로 예외 적용 */
function calcPairMultiplier(match, h, payerPid, payerScore, receiverScore, usedAllTieMult = 1, recvPid = null) {
  const birdieBonus = match.bettingRule?.birdieBonus ?? false;
  const doubleParBonus = match.bettingRule?.doubleParBonus ?? false;
  const par = state.settings.par[h];
  const birdieExempt = match.bettingRule?.birdieExempt ?? [];
  const doubleParExempt = match.bettingRule?.doubleParExempt ?? [];
  const allTieExempt = match.bettingRule?.allTieExempt ?? [];
  let bonusMult = 1;
  // 버디: 받는 쪽이 버디, 단 주는 쪽이 예외면 비적용
  if (birdieBonus && receiverScore <= par - 1 && !birdieExempt.includes(payerPid)) bonusMult++;
  // 더블파: 주는 쪽이 더블파, 단 주는 쪽이 예외면 비적용
  if (doubleParBonus && payerScore >= par * 2 && !doubleParExempt.includes(payerPid)) bonusMult++;
  bonusMult = Math.min(bonusMult, 3);
  // 올타이 캐리: 페어 중 한 명이라도 예외면 비적용
  const allTieMult = (usedAllTieMult > 1 && !allTieExempt.includes(payerPid) && !(recvPid && allTieExempt.includes(recvPid))) ? usedAllTieMult : 1;
  return bonusMult * allTieMult;
}

/** 홀별 승자 및 타당 계산 */
function calcHoleResults(match) {
  const { playerIds, scores, bettingRule } = match;
  const mode = bettingRule?.mode || state.settings.betMode;
  const base = bettingRule?.baseAmount || state.settings.baseAmount;
  const results = []; // per hole: {hole, winnerId, scores, amounts, carried, multiplier}

  let skinPot = 0;
  let allTieCarryMult = 1; // 올타이 다음 홀 2배 캐리

  for (let h = 0; h < 18; h++) {
    const holeScores = playerIds.map(pid => {
      const sc = scores?.[pid]?.[h];
      return { pid, score: (sc !== undefined && sc !== '' && sc !== null) ? Number(sc) : null };
    }).filter(s => s.score !== null && s.score > 0);

    if (holeScores.length < 2) {
      results.push({ hole: h+1, winnerId: null, scores: holeScores, amounts: {}, carried: skinPot, multiplier: 1, allTieMult: allTieCarryMult });
      allTieCarryMult = 1;
      continue;
    }

    const minScore = Math.min(...holeScores.map(s => s.score));
    const maxScore = Math.max(...holeScores.map(s => s.score));
    const winners = holeScores.filter(s => s.score === minScore);

    // 친선전: 금액 계산 없이 승자만 기록
    if (mode === 'friendly') {
      const isAllTied = minScore === maxScore;
      results.push({ hole: h+1, winnerId: winners.length === 1 ? winners[0].pid : null, winnerIds: winners.map(w => w.pid), tie: isAllTied, scores: holeScores, amounts: {}, txns: [], carried: 0, multiplier: 1, allTieMult: 1 });
      continue;
    }

    const baseMultiplier = calcHoleMultiplier(match, h, holeScores);
    const multiplier = baseMultiplier * allTieCarryMult;
    const usedAllTieMult = allTieCarryMult;

    // 이번 홀이 올타이(전원 동점)이면 다음 홀 2배 캐리
    const isAllTied = minScore === maxScore;
    allTieCarryMult = (bettingRule?.allTieDouble && isAllTied) ? 2 : 1;

    if (mode === 'skin') {
      // 스킨 방식: 단독 우승 시 팟 획득, 타이면 다음 홀로 이월
      skinPot += base * multiplier;
      if (winners.length === 1) {
        const n = holeScores.length;
        const loseAmt = Math.floor(skinPot / n / base) * base;
        const winnerAmt = (n - 1) * loseAmt; // zero-sum 보장, base 단위
        const amounts = {};
        holeScores.forEach(s => {
          amounts[s.pid] = s.pid === winners[0].pid ? winnerAmt : -loseAmt;
        });
        results.push({ hole: h+1, winnerId: winners[0].pid, winnerIds: [winners[0].pid], scores: holeScores, amounts, carried: skinPot - base * multiplier, multiplier, allTieMult: usedAllTieMult });
        skinPot = 0;
      } else {
        // 타이: 이월
        results.push({ hole: h+1, winnerId: null, winnerIds: [], tie: true, scores: holeScores, amounts: {}, carried: skinPot, multiplier, allTieMult: usedAllTieMult });
      }
    } else {
      // 타수 차이 방식: 모든 플레이어 쌍 간 직접 정산
      if (winners.length >= holeScores.length) {
        results.push({ hole: h+1, winnerId: null, tie: true, scores: holeScores, amounts: {}, carried: 0, multiplier, allTieMult: usedAllTieMult });
        continue;
      }
      const amounts = {};
      const holeTxnList = [];
      playerIds.forEach(pid => { amounts[pid] = 0; });
      // 모든 쌍: 페어별 배율 적용 (주는 사람 기준 예외)
      for (let a = 0; a < holeScores.length; a++) {
        for (let b = a + 1; b < holeScores.length; b++) {
          const { pid: pA, score: sA } = holeScores[a];
          const { pid: pB, score: sB } = holeScores[b];
          if (sA === sB) continue;
          const [payerPid, payerScore, recvPid, recvScore] = sA > sB ? [pA, sA, pB, sB] : [pB, sB, pA, sA];
          const pairMult = calcPairMultiplier(match, h, payerPid, payerScore, recvScore, usedAllTieMult, recvPid);
          const pay = Math.abs(sA - sB) * base * pairMult;
          amounts[payerPid] -= pay;
          amounts[recvPid]  += pay;
          holeTxnList.push({ from: payerPid, to: recvPid, amt: pay });
        }
      }
      results.push({ hole: h+1, winnerId: winners.length === 1 ? winners[0].pid : null, winnerIds: winners.map(w => w.pid), tie: winners.length > 1, scores: holeScores, amounts, txns: holeTxnList, carried: 0, multiplier, allTieMult: usedAllTieMult });
    }
  }

  // 마지막 이월 스킨팟 처리 (경기 종료 시 분배 안 함 - 남은 팟)
  return { holeResults: results, remainingSkinPot: skinPot };
}

/** 최소 거래로 정산 계산 */
function calcSettlements(players, totals) {
  const bal = players.map(p => ({ p, amt: Math.round(totals[p.id]?.amount || 0) }));
  const txns = [];
  for (let i = 0; i < 100; i++) { // 무한루프 방지
    const debtors   = bal.filter(b => b.amt < -1).sort((a, b) => a.amt - b.amt);
    const creditors = bal.filter(b => b.amt >  1).sort((a, b) => b.amt - a.amt);
    if (!debtors.length || !creditors.length) break;
    const d = debtors[0], c = creditors[0];
    const amt = Math.min(Math.abs(d.amt), c.amt);
    txns.push({ from: d.p, to: c.p, amt });
    d.amt += amt;
    c.amt -= amt;
  }
  return txns;
}

/** 홀 pairwise 정산 목록: 타수 나쁜 순으로 페어별 직접 거래 */
function calcPairwiseTxns(holeScores, base, multiplier) {
  const sorted = [...holeScores].sort((a, b) => b.score - a.score); // 타수 많은 쪽부터
  const txns = [];
  for (let a = 0; a < sorted.length; a++) {
    for (let b = a + 1; b < sorted.length; b++) {
      if (sorted[a].score === sorted[b].score) continue;
      const amt = (sorted[a].score - sorted[b].score) * base * multiplier;
      const from = state.players.find(p => p.id === sorted[a].pid);
      const to   = state.players.find(p => p.id === sorted[b].pid);
      if (from && to && amt > 0) txns.push({ from, to, amt });
    }
  }
  return txns;
}

/** 정산 행 HTML (from → 금액 → to 중앙 배치) */
function settleTxnRowHTML(tx, fci, tci) {
  return `
    <div style="display:flex;align-items:center;padding:7px 0;border-top:1px solid #f0f0f0">
      <span style="flex:1;text-align:right;font-size:13px;font-weight:700;color:${COLOR_HEX[fci]};padding-right:6px">${tx.from.name}</span>
      <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0;min-width:80px">
        <span style="font-size:13px;font-weight:800;color:var(--green-dark);white-space:nowrap">${tx.amt.toLocaleString()}원</span>
        <span style="font-size:11px;color:var(--text-light);line-height:1.2">──▶</span>
      </div>
      <span style="flex:1;text-align:left;font-size:13px;font-weight:700;color:${COLOR_HEX[tci]};padding-left:6px">${tx.to.name}</span>
    </div>`;
}

/** 플레이어별 합계 */
/** 핸디 선불 정산 트랜잭션 계산 (낮은 핸디 → 높은 핸디, 소수점 반올림) */
function calcHandicapTxns(match) {
  const mode = match.bettingRule?.mode || state.settings.betMode;
  if (mode === 'friendly') return [];
  const base = match.bettingRule?.baseAmount || state.settings.baseAmount;
  const players = match.playerIds.map(id => state.players.find(p => p.id === id)).filter(Boolean);
  const hcPlayers = players.map(p => ({ ...p, hc: Math.round((match.handicaps?.[p.id] ?? p.handicap) || 0) }));
  const txns = [];
  for (let a = 0; a < hcPlayers.length; a++) {
    for (let b = a + 1; b < hcPlayers.length; b++) {
      const pA = hcPlayers[a], pB = hcPlayers[b];
      if (pA.hc === pB.hc) continue;
      const [payer, receiver] = pA.hc < pB.hc ? [pA, pB] : [pB, pA];
      txns.push({ from: payer, to: receiver, amt: Math.abs(pA.hc - pB.hc) * base });
    }
  }
  return txns;
}

function calcPlayerTotals(match) {
  const { holeResults } = calcHoleResults(match);
  const totals = {};
  match.playerIds.forEach(pid => { totals[pid] = { amount: 0, wins: 0, score: 0 }; });

  holeResults.forEach(hr => {
    match.playerIds.forEach(pid => {
      if(hr.amounts[pid]) totals[pid].amount += hr.amounts[pid];
      if(hr.winnerIds ? hr.winnerIds.includes(pid) : hr.winnerId === pid) totals[pid].wins += 1;
      const sc = match.scores?.[pid]?.[hr.hole-1];
      if(sc !== '' && sc !== null && sc !== undefined) totals[pid].score += Number(sc);
    });
  });

  // 핸디 선불 정산 금액 반영
  calcHandicapTxns(match).forEach(tx => {
    if (totals[tx.from.id] !== undefined) totals[tx.from.id].amount -= tx.amt;
    if (totals[tx.to.id]   !== undefined) totals[tx.to.id].amount   += tx.amt;
  });

  return totals;
}

/** 18홀 입력 완료 여부 */
function isMatchComplete(match) {
  if(!match.scores) return false;
  return match.playerIds.every(pid => {
    const sc = match.scores[pid];
    return sc && sc.filter(s => s !== null && s !== '' && s > 0).length === 18;
  });
}

/** 파에서 조정된 홀 수 (진행률용) */
function countEnteredHoles(match) {
  if(!match.scores || !match.playerIds.length) return 0;
  // 어느 한 플레이어라도 파와 다른 타수를 기록한 홀 수
  let count = 0;
  for (let hi = 0; hi < 18; hi++) {
    const par = state.settings.par[hi];
    const adjusted = match.playerIds.some(pid => {
      const sc = match.scores[pid]?.[hi];
      return sc !== '' && sc !== null && sc !== undefined && Number(sc) !== par;
    });
    if (adjusted) count++;
  }
  return count;
}

// ================================================================
// UI 렌더링
// ================================================================

function render() {
  renderTab(state.currentTab);
  // 탭 활성화
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.tab === state.currentTab);
  });
}

function switchTab(tab) {
  state.currentTab = tab;
  render();
}

// ---- 경기 탭 ----
function renderMatches() {
  clearSwipeHandlers();
  const mc = document.getElementById('mainContent');
  const hdr = document.getElementById('headerActions');
  hdr.innerHTML = `<button class="btn btn-gold btn-sm" onclick="openNewMatchModal()">+ 경기 추가</button>`;

  if(!state.matches.length) {
    mc.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">🏌️</div>
        <div class="empty-title">경기 기록이 없습니다</div>
        <div class="empty-desc">오른쪽 상단 버튼으로<br>첫 경기를 시작해보세요!</div>
      </div>
      <div style="margin-top:20px">
        <button class="btn btn-gold btn-full" onclick="openNewMatchModal()" style="font-size:16px;padding:14px">
          ⛳ 새 경기 시작하기
        </button>
      </div>`;
    return;
  }

  const sorted = [...state.matches].sort((a,b) => new Date(b.date) - new Date(a.date));
  mc.innerHTML = `
    <div class="section-header">
      <div class="section-title">🏌️ 경기 목록</div>
    </div>
    ${sorted.map(m => renderMatchCard(m)).join('')}`;
}

function renderMatchCard(m) {
  const done = isMatchComplete(m);
  const entered = countEnteredHoles(m);
  const players = m.playerIds.map(pid => state.players.find(p => p.id === pid)).filter(Boolean);
  const mode = m.bettingRule?.mode || state.settings.betMode;
  const base = m.bettingRule?.baseAmount || state.settings.baseAmount;
  const playerChips = players.map((p, i) => {
    const ci = state.players.findIndex(pl => pl.id === p.id) % 4;
    const hc = m.handicaps?.[p.id] ?? p.handicap;
    return `<span class="player-chip ${PLAYER_BG_COLORS[ci]} unselected" style="padding:4px 10px;font-size:12px;border-radius:16px;border-width:1.5px">${p.name}${hc ? ` (H${hc})` : ''}</span>`;
  }).join('');

  return `
    <div class="match-card" onclick="openMatch('${m.id}')">
      <div class="match-card-header">
        <div>
          <div class="match-title">${m.course}</div>
          <div class="match-date">${formatDate(m.date)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <button onclick="event.stopPropagation();openEditMatchModal('${m.id}')"
            style="background:rgba(255,255,255,0.15);border:none;border-radius:6px;padding:4px 8px;color:white;font-size:12px;cursor:pointer">✏️ 수정</button>
          <div class="match-status ${done ? 'status-done' : 'status-ongoing'}">
            ${done ? '완료' : entered > 0 ? `${entered}/18H` : '진행중'}
          </div>
        </div>
      </div>
      <div class="match-card-body">
        <div class="match-players">${playerChips}</div>
        <div class="match-info-row">
          <span>${mode === 'friendly' ? '🤝 친선전' : mode === 'skin' ? '🎯 스킨' : '⚡ 타수차'}${mode !== 'friendly' ? ` · ${base.toLocaleString()}원/타` : ''}</span>
          <span>${players.length}명</span>
        </div>
        ${entered > 0 ? `
          <div style="margin-top:8px">
            <div class="progress-bar"><div class="progress-fill" style="width:${(entered/18*100).toFixed(0)}%"></div></div>
            <div style="font-size:11px;color:var(--text-light)">${entered}/18 홀 입력완료</div>
          </div>` : ''}
      </div>
    </div>`;
}

// ---- 플레이어 탭 ----
function renderPlayers() {
  clearSwipeHandlers();
  const mc = document.getElementById('mainContent');
  const hdr = document.getElementById('headerActions');
  hdr.innerHTML = `<button class="btn btn-primary btn-sm" onclick="openAddPlayerModal()">+ 추가</button>`;

  if(!state.players.length) {
    mc.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">👤</div>
        <div class="empty-title">등록된 플레이어가 없습니다</div>
        <div class="empty-desc">경기를 시작하기 전에<br>플레이어를 먼저 등록하세요</div>
      </div>
      <div style="margin-top:20px">
        <button class="btn btn-primary btn-full" onclick="openAddPlayerModal()" style="font-size:16px;padding:14px">
          👤 플레이어 추가하기
        </button>
      </div>`;
    return;
  }

  mc.innerHTML = `
    <div class="section-header">
      <div class="section-title">👥 플레이어 목록</div>
    </div>
    ${state.players.map((p, i) => {
      const ci = i % 4;
      const pmatch = state.matches.filter(m => m.playerIds.includes(p.id));
      const totalWon = pmatch.reduce((sum, m) => {
        if(!m.scores) return sum;
        const totals = calcPlayerTotals(m);
        return sum + (totals[p.id]?.amount || 0);
      }, 0);
      return `
        <div class="card" style="display:flex;align-items:center;gap:14px">
          <div style="width:44px;height:44px;border-radius:50%;background:${COLOR_HEX[ci]};display:flex;align-items:center;justify-content:center;color:white;font-family:'Black Han Sans',sans-serif;font-size:18px;flex-shrink:0">
            ${p.name[0]}
          </div>
          <div style="flex:1">
            <div style="font-weight:700;font-size:16px">${p.name}</div>
            <div style="font-size:12px;color:var(--text-light)">${p.handicap ? `핸디 ${p.handicap}타` : '핸디 없음'}</div>
            <div style="font-size:12px;color:var(--text-light)">${pmatch.length}경기</div>
          </div>
          <div style="text-align:right">
            <div style="font-family:'Black Han Sans',sans-serif;font-size:16px" class="${totalWon > 0 ? 'amount-plus' : totalWon < 0 ? 'amount-minus' : 'amount-zero'}">
              ${totalWon > 0 ? '+' : ''}${totalWon.toLocaleString()}원
            </div>
            <div style="font-size:11px;color:var(--text-light)">누적 수익</div>
          </div>
          <button class="btn btn-sm btn-outline" onclick="openEditPlayerModal('${p.id}')" style="margin-right:4px">수정</button>
          <button class="btn btn-sm btn-outline" onclick="deletePlayer('${p.id}')">삭제</button>
        </div>`;
    }).join('')}`;
}

// ---- 스코어카드 탭 ----
function renderScorecard() {
  const mc = document.getElementById('mainContent');
  const hdr = document.getElementById('headerActions');

  if(!state.activeMatchId) {
    mc.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">📋</div>
        <div class="empty-title">경기를 선택하세요</div>
        <div class="empty-desc">경기 탭에서 진행할 경기를<br>선택하면 스코어를 입력할 수 있어요</div>
      </div>`;
    hdr.innerHTML = '';
    return;
  }

  const match = state.matches.find(m => m.id === state.activeMatchId);
  if(!match) { state.activeMatchId = null; renderScorecard(); return; }

  const players = match.playerIds.map(pid => state.players.find(p => p.id === pid)).filter(Boolean);

  hdr.innerHTML = `<button class="btn btn-gold btn-sm" onclick="switchTab('results')">💰 결과</button>`;

  // 빈 홀 파로 보완
  players.forEach(p => {
    if (!match.scores[p.id]) match.scores[p.id] = [...state.settings.par];
    else match.scores[p.id] = match.scores[p.id].map((sc, hi) =>
      (sc === '' || sc === null || sc === undefined) ? state.settings.par[hi] : sc
    );
  });
  saveState();

  // 현재 홀 인덱스
  if (state.activeHole == null) state.activeHole = 0;
  const hi = Math.max(0, Math.min(17, state.activeHole));
  const par = state.settings.par[hi];

  // 진행 점 (18개)
  const dots = Array.from({length: 18}, (_, i) => {
    const adjusted = players.some(p => Number(match.scores[p.id]?.[i]) !== state.settings.par[i]);
    const isCur = i === hi;
    return `<div class="hole-dot${adjusted?' adjusted':''}${isCur?' current':''}" onclick="goHole(${i})" title="${i+1}번"></div>`;
  }).join('');

  // 배율 계산
  const birdieExempt = match.bettingRule?.birdieExempt ?? [];
  const doubleParExempt = match.bettingRule?.doubleParExempt ?? [];
  const holeScoresForMult = players.map(p => {
    const sc = match.scores[p.id]?.[hi];
    return { pid: p.id, score: Number(sc) };
  });
  let mult = 1;
  if (match.bettingRule?.birdieBonus && holeScoresForMult.filter(s=>!birdieExempt.includes(s.pid)).some(s=>s.score===par-1)) mult++;
  if (match.bettingRule?.doubleParBonus && holeScoresForMult.filter(s=>!doubleParExempt.includes(s.pid)).some(s=>s.score>=par*2)) mult++;
  const multBadge = mult > 1
    ? `<span id="holeMultBadge" style="font-size:12px;font-weight:700;color:${mult===3?'#c0392b':'var(--gold)'};background:${mult===3?'rgba(192,57,43,0.12)':'rgba(212,168,67,0.15)'};border-radius:6px;padding:2px 8px;margin-left:6px">×${mult}</span>`
    : `<span id="holeMultBadge"></span>`;

  // 플레이어별 입력 행
  const playerRows = players.map(p => {
    const ci = state.players.findIndex(pl => pl.id === p.id) % 4;
    const sc = Number(match.scores[p.id]?.[hi] ?? par);
    const rel = sc - par;
    const relLabel = rel === 0 ? `<span style="color:var(--text-light)">파</span>`
      : rel < 0 ? `<span style="color:#2980b9;font-weight:700">${rel}</span>`
      : `<span style="color:var(--red-light);font-weight:700">+${rel}</span>`;
    const isDefault = sc === par;

    // 누적 타수 대비 파
    const totalRel = state.settings.par.reduce((sum, hpar, h) => {
      const s = Number(match.scores[p.id]?.[h]);
      return (s > 0) ? sum + s - hpar : sum;
    }, 0);
    const totalRelStr = totalRel === 0 ? 'E' : (totalRel > 0 ? `+${totalRel}` : `${totalRel}`);
    const totalRelColor = totalRel < 0 ? '#2980b9' : totalRel > 0 ? 'var(--red-light)' : 'var(--text-light)';
    return `
      <div class="player-score-row">
        <div style="width:42px;height:42px;border-radius:50%;background:${COLOR_HEX[ci]};display:flex;align-items:center;justify-content:center;color:white;font-family:'Black Han Sans',sans-serif;font-size:17px;flex-shrink:0">${p.name[0]}</div>
        <div class="ps-info">
          <div class="ps-name">${p.name}<span id="totalRel_${p.id}" style="font-size:11px;font-weight:700;margin-left:6px;color:${totalRelColor}">${totalRelStr}</span></div>
          <div class="ps-rel" id="rel_${p.id}_${hi}">${relLabel}</div>
        </div>
        <div class="big-stepper">
          <button class="big-stepper-btn" style="color:${COLOR_HEX[ci]};background:${COLOR_HEX[ci]}18" onclick="adjustScore('${p.id}',${hi},-1)">－</button>
          <div class="big-stepper-val" id="sc_${p.id}_${hi}" style="color:${isDefault?'var(--text-light)':COLOR_HEX[ci]}">${sc}</div>
          <button class="big-stepper-btn" style="color:${COLOR_HEX[ci]};background:${COLOR_HEX[ci]}18" onclick="adjustScore('${p.id}',${hi},1)">＋</button>
        </div>
      </div>`;
  }).join('');

  mc.innerHTML = `
    <div style="background:linear-gradient(160deg,var(--green-dark),var(--green-mid));border-radius:16px;padding:16px 16px 12px;margin-bottom:12px">
      <div style="text-align:center;margin-bottom:8px">
        <div style="font-family:'Black Han Sans',sans-serif;font-size:15px;color:white;opacity:0.95;letter-spacing:0.3px">${match.course}</div>
        <div style="font-size:11px;color:rgba(255,255,255,0.55);margin-top:1px">${formatDate(match.date)}</div>
      </div>
      <div class="hole-input-header">
        <button class="hole-nav-btn" onclick="goHole(${hi-1})" ${hi===0?'disabled':''}>‹</button>
        <div class="hole-number-display">
          <div class="hole-num-big">${hi+1}<span style="font-size:20px;opacity:0.5"> / 18</span></div>
          <div class="hole-par-label">
            <button onclick="adjustHolePar(${hi},-1)" style="background:none;border:none;color:var(--gold-light);font-size:18px;font-weight:700;cursor:pointer;padding:0 6px;line-height:1;opacity:0.8">－</button>
            <span id="holeParDisplay">파 ${par}</span>
            <button onclick="adjustHolePar(${hi},1)" style="background:none;border:none;color:var(--gold-light);font-size:18px;font-weight:700;cursor:pointer;padding:0 6px;line-height:1;opacity:0.8">＋</button>
            ${multBadge}
          </div>
        </div>
        <button class="hole-nav-btn" onclick="goHole(${hi+1})" ${hi===17?'disabled':''}>›</button>
      </div>
      <div class="hole-progress-dots">${dots}</div>
    </div>

    ${playerRows}

    <div id="settlementPanel" style="display:none"></div>

    <div class="hole-action-bar">
      <button class="btn btn-primary btn-full" style="flex:1" onclick="saveScores()">💾 저장</button>
      ${hi < 17
        ? `<button class="btn btn-gold" style="flex:2;font-size:15px" onclick="saveAndNextHole()">다음 홀 ${hi+2}번 →</button>`
        : `<button class="btn btn-gold" style="flex:2;font-size:15px" onclick="switchTab('results')">💰 결과 보기</button>`}
    </div>`;

  // 스와이프 좌우로 홀 이동
  attachSwipe(
    () => { if (hi < 17) goHole(hi + 1); },
    () => { if (hi > 0)  goHole(hi - 1); }
  );
}

// ---- 결과 탭 ----
function renderResults() {
  const mc = document.getElementById('mainContent');
  const hdr = document.getElementById('headerActions');
  hdr.innerHTML = '';

  if(!state.activeMatchId) {
    mc.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">💰</div>
        <div class="empty-title">경기를 선택하세요</div>
        <div class="empty-desc">경기 탭에서 경기를 선택하면<br>결과와 정산 내역을 볼 수 있어요</div>
      </div>`;

  }

  const match = state.matches.find(m => m.id === state.activeMatchId);

  // 순위 정렬 (타수 오름차순)

  // 수익 정렬 (내림차순)
  const byMoney = [...players].sort((a,b) => (totals[b.id]?.amount||0) - (totals[a.id]?.amount||0));

  const rankNums = ['🥇','🥈','🥉','4'];

  mc.innerHTML = `
    <div style="margin-bottom:16px">
      <div style="font-family:'Black Han Sans',sans-serif;font-size:18px;color:var(--green-dark)">${match.course}</div>
      <div style="font-size:12px;color:var(--text-light)">${formatDate(match.date)} · ${mode === 'friendly' ? '친선전' : mode === 'skin' ? '스킨' : '타수차'}${mode !== 'friendly' ? ` · ${base.toLocaleString()}원` : ''}</div>
      ${(match.bettingRule?.birdieBonus || match.bettingRule?.doubleParBonus || match.bettingRule?.allTieDouble) ? (() => {
        const birdieExemptNames = (match.bettingRule?.birdieExempt ?? []).map(id => state.players.find(p => p.id === id)?.name).filter(Boolean);
        const doubleParExemptNames = (match.bettingRule?.doubleParExempt ?? []).map(id => state.players.find(p => p.id === id)?.name).filter(Boolean);
        const allTieExemptNames = (match.bettingRule?.allTieExempt ?? []).map(id => state.players.find(p => p.id === id)?.name).filter(Boolean);
        return `<div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
          ${match.bettingRule?.birdieBonus ? `<span style="font-size:11px;background:rgba(212,168,67,0.15);color:var(--gold);border:1px solid var(--gold);border-radius:4px;padding:2px 7px;font-weight:600">🦅 버디 ×2${birdieExemptNames.length ? ` <span style="font-weight:400">(${birdieExemptNames.join('·')} 예외)</span>` : ''}</span>` : ''}
          ${match.bettingRule?.doubleParBonus ? `<span style="font-size:11px;background:rgba(192,57,43,0.1);color:#c0392b;border:1px solid #c0392b;border-radius:4px;padding:2px 7px;font-weight:600">💀 더블파 ×2${doubleParExemptNames.length ? ` <span style="font-weight:400">(${doubleParExemptNames.join('·')} 예외)</span>` : ''}</span>` : ''}
          ${match.bettingRule?.allTieDouble ? `<span style="font-size:11px;background:rgba(41,128,185,0.1);color:#2980b9;border:1px solid #2980b9;border-radius:4px;padding:2px 7px;font-weight:600">🤝 올타이 다음홀 ×2${allTieExemptNames.length ? ` <span style="font-weight:400">(${allTieExemptNames.join('·')} 예외)</span>` : ''}</span>` : ''}
          <span style="font-size:11px;color:var(--text-light)">중복 최대 ×3</span>
        </div>`;
      })() : ''}
    </div>

    ${entered < 18 ? `
      <div style="background:#f0f4ff;border:1px solid #b0c4de;border-radius:8px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:#3a5a8a">
        ℹ️ ${entered}홀 조정됨 — 나머지 홀은 파 기준 계산
      </div>` : ''}

    ${mode === 'skin' && remainingSkinPot > 0 ? `
      <div class="skin-pot">
        <span>🎯 미확정 스킨팟</span>
        <span>${remainingSkinPot.toLocaleString()}원</span>
      </div>` : ''}

    <div style="font-family:'Black Han Sans',sans-serif;font-size:15px;color:var(--green-dark);margin-bottom:10px">🏌️ 홀별 스코어</div>
    <div style="overflow-x:auto;margin-bottom:20px;border-radius:10px;border:1px solid #e0e0e0">
      <table style="border-collapse:collapse;min-width:100%;font-size:12px;white-space:nowrap">
        <thead>
          <tr style="background:var(--green-dark);color:white">
            <td style="padding:7px 10px;font-weight:700;position:sticky;left:0;background:var(--green-dark);z-index:1">HOLE</td>
            ${state.settings.par.map((_, h) => `<td style="padding:7px 7px;text-align:center;font-weight:700">${h+1}</td>`).join('')}
            <td style="padding:7px 8px;text-align:center;font-weight:700">T</td>
          </tr>
          <tr style="background:#f5f5f5">
            <td style="padding:6px 10px;font-weight:600;color:var(--text-mid);position:sticky;left:0;background:#f5f5f5;z-index:1">Par</td>
            ${state.settings.par.map(p => `<td style="padding:6px 7px;text-align:center;color:var(--text-mid)">${p}</td>`).join('')}
            <td style="padding:6px 8px;text-align:center;font-weight:700;color:var(--text-mid)">${state.settings.par.reduce((s,p)=>s+p,0)}</td>
          </tr>
        </thead>
        <tbody>
          ${players.map((p, pi) => {
            const ci = state.players.findIndex(pl => pl.id === p.id) % 4;
            let total = 0;
            const cells = state.settings.par.map((par, h) => {
              const sc = match.scores?.[p.id]?.[h];
              const v = (sc !== null && sc !== undefined && sc !== '') ? Number(sc) : null;
              if (v) total += v;
              const diff = v !== null ? v - par : null;
              let bg = 'transparent', color = 'var(--text-dark)', fw = '400', border = '';
              if (diff !== null) {
                if (diff <= -2)      { bg='#e8f4fd'; color='#1565c0'; fw='700'; border='2px solid #1565c0'; }
                else if (diff === -1){ bg='#e8f4fd'; color='#2980b9'; fw='700'; border='1px solid #2980b9'; }
                else if (diff === 0) { color='var(--text-mid)'; }
                else if (diff === 1) { color='#c0392b'; }
                else                 { bg='#fdecea'; color='#c0392b'; fw='700'; }
              }
              return `<td style="padding:6px 7px;text-align:center">
                <span style="display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:${diff !== null && diff <= -1 ? '50%' : '3px'};background:${bg};color:${color};font-weight:${fw};border:${border};font-size:12px">${v ?? '-'}</span>
              </td>`;
            }).join('');
            return `<tr style="border-top:1px solid #eee;background:${pi%2===0?'white':'#fafafa'}">
              <td style="padding:6px 10px;font-weight:700;color:${COLOR_HEX[ci]};position:sticky;left:0;background:${pi%2===0?'white':'#fafafa'};z-index:1">${p.name}</td>
              ${cells}
              <td style="padding:6px 8px;text-align:center;font-weight:800;font-size:13px">${total||'-'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
      <div style="font-family:'Black Han Sans',sans-serif;font-size:15px;color:var(--green-dark)">${mode === 'friendly' ? '🏆 순위' : '💰 정산 결과'}</div>
      ${mode !== 'friendly' ? `
      <div style="display:flex;gap:4px">
        <button onclick="setResultSort('score')" id="sortByScore"
          style="padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid ${resultSortMode==='score'?'var(--green-dark)':'var(--border)'};background:${resultSortMode==='score'?'var(--green-dark)':'white'};color:${resultSortMode==='score'?'white':'var(--text-mid)'}">타수</button>
        <button onclick="setResultSort('amount')" id="sortByAmount"
          style="padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid ${resultSortMode==='amount'?'var(--green-dark)':'var(--border)'};background:${resultSortMode==='amount'?'var(--green-dark)':'white'};color:${resultSortMode==='amount'?'white':'var(--text-mid)'}">금액</button>
      </div>` : ''}
    </div>
    ${(resultSortMode === 'amount' && mode !== 'friendly'
        ? [...players].sort((a,b) => (totals[b.id]?.amount||0) - (totals[a.id]?.amount||0))
        : ranked
      ).map((p, i) => {
      const ci = state.players.findIndex(pl => pl.id === p.id) % 4;
      const t = totals[p.id] || { amount: 0, wins: 0, score: 0 };
      const rankIdx = ranked.findIndex(r => r.id === p.id);
      return `
        <div class="result-player-card">
          <div class="result-rank ${rankIdx < 3 ? `rank-${rankIdx+1}` : ''}">${rankNums[rankIdx] || rankIdx+1}</div>
          <div style="width:40px;height:40px;border-radius:50%;background:${COLOR_HEX[ci]};display:flex;align-items:center;justify-content:center;color:white;font-family:'Black Han Sans',sans-serif;font-size:16px;flex-shrink:0">${p.name[0]}</div>
          <div class="result-player-info">
            <div class="result-player-name">
              ${p.name}
              ${t.wins > 0 ? `<span class="badge badge-gold">${t.wins}홀 승</span>` : ''}
            </div>
            <div class="result-player-score">
              ${(() => { const hc = match.handicaps?.[p.id] ?? p.handicap; return `총 ${t.score || '-'}타${hc ? ` (넷 ${(t.score||0) - hc}타)` : ''}`; })()}
            </div>
          </div>
          ${mode !== 'friendly' ? `<div class="result-amount ${t.amount > 0 ? 'amount-plus' : t.amount < 0 ? 'amount-minus' : 'amount-zero'}">${t.amount > 0 ? '+' : ''}${t.amount.toLocaleString()}원</div>` : ''}
        </div>`;
    }).join('')}

    ${(() => {
      const hcTxns = calcHandicapTxns(match)
        .sort((a, b) => a.from.name.localeCompare(b.from.name, 'ko'));
      if (!hcTxns.length) return '';
      const rows = hcTxns.map(tx => {
        const fci = state.players.findIndex(p => p.id === tx.from.id) % 4;
        const tci = state.players.findIndex(p => p.id === tx.to.id) % 4;
        return settleTxnRowHTML(tx, fci, tci);
      }).join('');
      return `
        <div style="font-family:'Black Han Sans',sans-serif;font-size:15px;color:var(--green-dark);margin:20px 0 10px">🏌️ 핸디 선불 정산</div>
        <div class="card" style="padding:14px 16px;margin-bottom:0">
          <div style="font-size:11px;color:var(--text-light);margin-bottom:8px">핸디 차이만큼 미리 주고받아 공평하게 시작 (소수점 반올림)</div>
          ${rows}
        </div>`;
    })()}

    <div style="font-family:'Black Han Sans',sans-serif;font-size:15px;color:var(--green-dark);margin:20px 0 10px">📊 홀별 내역</div>
    <div class="card" style="padding:0;overflow:hidden">
      ${holeResults.filter(hr => hr.scores.length >= 2).map(hr => {
        const winner = hr.winnerId ? state.players.find(p => p.id === hr.winnerId) : null;
        const winnerCi = winner ? state.players.findIndex(p => p.id === winner.id) % 4 : 0;
        const scoreBadges = hr.scores.map(s => {
          const pp = state.players.find(pl => pl.id === s.pid);
          const ci2 = state.players.findIndex(pl => pl.id === s.pid) % 4;
          const amt = hr.amounts[s.pid];
          return `<span style="font-size:12px;padding:2px 6px;border-radius:8px;background:${COLOR_HEX[ci2]}22;color:${COLOR_HEX[ci2]};font-weight:600">${pp?.name||'?'} ${s.score}타${(mode !== 'friendly' && amt) ? ` (${amt > 0 ? '+' : ''}${Math.round(amt).toLocaleString()})` : ''}</span>`;
        }).join('');

        // 홀 정산 내역: 모든 페어 직접 정산
        const holeTxns = mode === 'skin'
          ? calcSettlements(
              hr.scores.map(s => state.players.find(p => p.id === s.pid)).filter(Boolean),
              Object.fromEntries(hr.scores.map(s => [s.pid, { amount: hr.amounts[s.pid] ?? 0 }]))
            )
          : (hr.txns || []).map(t => ({
              from: state.players.find(p => p.id === t.from),
              to:   state.players.find(p => p.id === t.to),
              amt:  t.amt
            })).filter(t => t.from && t.to);
        const txnRows = holeTxns.map(tx => {
          const fci = state.players.findIndex(p => p.id === tx.from.id) % 4;
          const tci = state.players.findIndex(p => p.id === tx.to.id)   % 4;
          return settleTxnRowHTML(tx, fci, tci);
        }).join('');

        return `
          <div class="hole-result-row" style="flex-direction:column;align-items:stretch;gap:0;padding:10px 14px">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <div class="hole-num" style="flex-shrink:0">${hr.hole}</div>
              <div style="flex:1">
                <div style="font-size:12px;margin-bottom:4px">
                  ${hr.tie ? `<span style="color:var(--text-light)">⚖️ 타이 ${mode==="skin"?"(이월)":"(무승부)"}</span>` :
                    winner ? `<span style="color:${COLOR_HEX[winnerCi]};font-weight:700">🏆 ${winner.name}</span>` : '<span style="color:var(--text-light)">미입력</span>'}
                  ${hr.carried > 0 ? `<span style="font-size:11px;color:var(--gold);margin-left:4px">팟 ${hr.carried.toLocaleString()}↑</span>` : ''}
                ${hr.allTieMult > 1 ? `<span style="font-size:11px;color:#2980b9;margin-left:4px;font-weight:700">🤝×${hr.allTieMult}</span>` : ''}
                </div>
                <div style="display:flex;flex-wrap:wrap;gap:4px">${scoreBadges}</div>
              </div>
            </div>
            ${(mode !== 'friendly' && txnRows) ? `<div style="padding-top:2px">${txnRows}</div>` : ''}
          </div>`;
      }).join('')}
    </div>

    <div style="height:20px"></div>`;

  // 결과 화면 스와이프: 이전/다음 경기 이동
  const matchIds = state.matches.map(m => m.id);
  const curIdx = matchIds.indexOf(state.activeMatchId);
  attachSwipe(
    () => { if (curIdx < matchIds.length - 1) { state.activeMatchId = matchIds[curIdx + 1]; renderResults(); } },
    () => { if (curIdx > 0) { state.activeMatchId = matchIds[curIdx - 1]; renderResults(); } }
  );
}

function openMatch(id) {
  state.activeMatchId = id;
  // 마지막으로 조정된 홀 다음으로 이동 (없으면 0번)
  const match = state.matches.find(m => m.id === id);
  if (match) {
    let lastAdjusted = -1;
    for (let hi = 0; hi < 18; hi++) {
      const par = state.settings.par[hi];
      const adjusted = match.playerIds.some(pid => Number(match.scores?.[pid]?.[hi]) !== par);
      if (adjusted) lastAdjusted = hi;
    }
    state.activeHole = Math.min(17, lastAdjusted + 1);
  } else {
    state.activeHole = 0;
  }
  state.currentTab = 'scorecard';
  render();
}

function goHole(hi) {
  const idx = Math.max(0, Math.min(17, hi));
  if (idx === state.activeHole) return;
  state.activeHole = idx;
  saveState();
  renderScorecard();
}

function adjustHolePar(hi, delta) {
  const newPar = Math.max(3, Math.min(5, state.settings.par[hi] + delta));
  if (newPar === state.settings.par[hi]) return;
  state.settings.par[hi] = newPar;
  saveState();

  // 파 표시 업데이트
  const parEl = document.getElementById('holeParDisplay');
  if (parEl) parEl.textContent = `파 ${newPar}`;

  // 이 홀의 플레이어 스코어가 파와 같으면 새 파로 맞춰 업데이트
  const match = state.matches.find(m => m.id === state.activeMatchId);
  if (match) {
    match.playerIds.forEach(pid => {
      const sc = match.scores?.[pid]?.[hi];
      // 해당 홀 상대타수 레이블 재계산
      const relEl = document.getElementById(`rel_${pid}_${hi}`);
      if (relEl && sc !== null && sc !== undefined && sc !== '') {
        const rel = Number(sc) - newPar;
        relEl.innerHTML = rel === 0
          ? `<span style="color:var(--text-light)">파</span>`
          : rel < 0 ? `<span style="color:#2980b9;font-weight:700">${rel}</span>`
          : `<span style="color:var(--red-light);font-weight:700">+${rel}</span>`;
      }
    });
  }

  showToast(`${hi+1}번 홀 파 → ${newPar}`);
}

function saveAndNextHole() {
  saveState();
  showToast('✅ 저장됨');
  goHole((state.activeHole ?? 0) + 1);
}

function adjustScore(pid, hi, delta) {
  const match = state.matches.find(m => m.id === state.activeMatchId);
  if (!match) return;
  const current = match.scores?.[pid]?.[hi];
  const base = (current !== '' && current !== null && current !== undefined) ? Number(current) : state.settings.par[hi];
  const newVal = Math.max(1, Math.min(state.settings.par[hi] * 2, base + delta));
  if (!match.scores) match.scores = {};
  if (!match.scores[pid]) match.scores[pid] = [...state.settings.par];
  match.scores[pid][hi] = newVal;
  saveState();

  // 홀별 모드: 해당 플레이어 셀만 즉시 업데이트
  const ci = state.players.findIndex(p => p.id === pid) % 4;
  const par = state.settings.par[hi];
  const isDefault = newVal === par;
  const valEl = document.getElementById(`sc_${pid}_${hi}`);
  if (valEl) {
    valEl.textContent = newVal;
    valEl.style.color = isDefault ? 'var(--text-light)' : COLOR_HEX[ci];
  }
  // 누적 타수 대비 파 업데이트
  const totalRelEl = document.getElementById(`totalRel_${pid}`);
  if (totalRelEl) {
    const totalRel = state.settings.par.reduce((sum, hpar, h) => {
      const s = Number(match.scores[pid]?.[h]);
      return (s > 0) ? sum + s - hpar : sum;
    }, 0);
    totalRelEl.textContent = totalRel === 0 ? 'E' : (totalRel > 0 ? `+${totalRel}` : `${totalRel}`);
    totalRelEl.style.color = totalRel < 0 ? '#2980b9' : totalRel > 0 ? 'var(--red-light)' : 'var(--text-light)';
  }
  // 상대타수 레이블 업데이트
  const relEl = document.getElementById(`rel_${pid}_${hi}`);
  if (relEl) {
    const rel = newVal - par;
    relEl.innerHTML = rel === 0
      ? `<span style="color:var(--text-light)">파</span>`
      : rel < 0 ? `<span style="color:#2980b9;font-weight:700">${rel}</span>`
      : `<span style="color:var(--red-light);font-weight:700">+${rel}</span>`;
  }
  // 진행 점 업데이트 (해당 홀 dot)
  const players = match.playerIds.map(id => state.players.find(p => p.id === id)).filter(Boolean);
  const dotEl = document.querySelector(`.hole-dot:nth-child(${hi + 1})`);
  if (dotEl) {
    const adjusted = players.some(p => Number(match.scores[p.id]?.[hi]) !== state.settings.par[hi]);
    dotEl.classList.toggle('adjusted', adjusted);
  }
  // 배율 뱃지 업데이트
  if (match.bettingRule?.birdieBonus || match.bettingRule?.doubleParBonus) {
    const par_h = state.settings.par[hi];
    const holeScores = players.map(p => ({ pid: p.id, score: Number(match.scores[p.id]?.[hi]) }));
    const birdieExempt = match.bettingRule?.birdieExempt ?? [];
    const doubleParExempt = match.bettingRule?.doubleParExempt ?? [];
    let mult = 1;
    if (match.bettingRule?.birdieBonus && holeScores.filter(s => !birdieExempt.includes(s.pid)).some(s => s.score <= par_h - 1)) mult++;
    if (match.bettingRule?.doubleParBonus && holeScores.filter(s => !doubleParExempt.includes(s.pid)).some(s => s.score >= par_h * 2)) mult++;
    const mc2 = document.getElementById('holeMultBadge');
    if (mc2) {
      mc2.innerHTML = mult > 1
        ? `<span style="font-size:12px;font-weight:700;color:${mult===3?'#c0392b':'var(--gold)'};background:${mult===3?'rgba(192,57,43,0.12)':'rgba(212,168,67,0.15)'};border-radius:6px;padding:2px 8px;margin-left:6px">×${mult}</span>`
        : '';
    }
  }
}

function updateScore(pid, holeIdx, val) {
  const match = state.matches.find(m => m.id === state.activeMatchId);
  if(!match) return;
  if(!match.scores) match.scores = {};
  if(!match.scores[pid]) match.scores[pid] = new Array(18).fill('');
  match.scores[pid][holeIdx] = val === '' ? '' : Math.max(1, Math.min(20, Number(val)));
  saveState();
}

function saveScores() {
  saveState();
  showToast('✅ 스코어 저장 완료!');

  const panel = document.getElementById('settlementPanel');
  if (!panel) return;

  const match = state.matches.find(m => m.id === state.activeMatchId);
  if (!match) return;

  const players = match.playerIds.map(pid => state.players.find(p => p.id === pid)).filter(Boolean);
  const hi = state.activeHole ?? 0;

  // 현재 홀 타수 기반 정산
  const { holeResults } = calcHoleResults(match);
  const hr = holeResults.find(r => r.hole === hi + 1);
  const matchMode = match.bettingRule?.mode || state.settings.betMode;
  const matchBase = match.bettingRule?.baseAmount || state.settings.baseAmount;
  const holeTxns = (hr && matchMode !== 'friendly')
    ? (matchMode === 'skin'
        ? calcSettlements(
            hr.scores.map(s => state.players.find(p => p.id === s.pid)).filter(Boolean),
            Object.fromEntries(hr.scores.map(s => [s.pid, { amount: hr.amounts[s.pid] ?? 0 }]))
          )
        : (hr.txns || []).map(t => ({
            from: state.players.find(p => p.id === t.from),
            to:   state.players.find(p => p.id === t.to),
            amt:  t.amt
          })).filter(t => t.from && t.to))
    : [];
  const subtitle = `${hi + 1}번 홀 정산`;

  if (matchMode === 'friendly') {
    panel.innerHTML = '';
  } else if (holeTxns.length === 0) {
    panel.innerHTML = `
      <div style="background:white;border-radius:12px;padding:14px 16px;margin:10px 0 4px;border:1.5px solid #e8f5e9">
        <div style="font-weight:700;font-size:13px;color:var(--green-dark);margin-bottom:6px">💰 정산 현황 <span style="font-weight:400;font-size:11px;color:var(--text-light)">(${subtitle})</span></div>
        <div style="color:var(--text-light);font-size:13px;text-align:center;padding:6px 0">이 홀은 정산 없음 (동점)</div>
      </div>`;
  } else {
    const rows = holeTxns.map(t => {
      const ci_from = state.players.findIndex(p => p.id === t.from.id) % 4;
      const ci_to   = state.players.findIndex(p => p.id === t.to.id)   % 4;
      return settleTxnRowHTML(t, ci_from, ci_to);
    }).join('');
    panel.innerHTML = `
      <div style="background:white;border-radius:12px;padding:14px 16px;margin:10px 0 4px;border:1.5px solid #e8f5e9">
        <div style="font-weight:700;font-size:13px;color:var(--green-dark);margin-bottom:8px">💰 정산 현황 <span style="font-weight:400;font-size:11px;color:var(--text-light)">(${subtitle})</span></div>
        ${rows}
      </div>`;
  }
  panel.style.display = 'block';
  panel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

// 스와이프 핸들러 전역 관리 (탭 전환 시 이전 핸들러 제거용)
let _swipeStart = null;
let _swipeEnd = null;
function clearSwipeHandlers() {
  const mc = document.getElementById('mainContent');
  if (!mc) return;
  if (_swipeStart) mc.removeEventListener('touchstart', _swipeStart);
  if (_swipeEnd)   mc.removeEventListener('touchend',   _swipeEnd);
  _swipeStart = null;
  _swipeEnd   = null;
}
function attachSwipe(onLeft, onRight) {
  clearSwipeHandlers();
  const mc = document.getElementById('mainContent');
  if (!mc) return;
  let tx = 0, ty = 0;
  _swipeStart = e => { tx = e.touches[0].clientX; ty = e.touches[0].clientY; };
  _swipeEnd   = e => {
    const dx = e.changedTouches[0].clientX - tx;
    const dy = e.changedTouches[0].clientY - ty;
    if (Math.abs(dx) < 50 || Math.abs(dy) > Math.abs(dx)) return;
    if (dx < 0) onLeft?.();
    else        onRight?.();
  };
  mc.addEventListener('touchstart', _swipeStart, { passive: true });
  mc.addEventListener('touchend',   _swipeEnd,   { passive: true });
}

function togglePlayerSelect(pid) {
  const label = document.getElementById(`pLabel_${pid}`);
  const icon = document.getElementById(`pCheck_icon_${pid}`);
  const idx = selectedPlayers.indexOf(pid);
  if(idx >= 0) {
    selectedPlayers.splice(idx, 1);
    label.style.background = '';
    if(icon) icon.style.display = 'none';
    // 예외 목록에서도 제거
    matchBirdieExempt = matchBirdieExempt.filter(id => id !== pid);
    matchDoubleParExempt = matchDoubleParExempt.filter(id => id !== pid);
    matchAllTieExempt = matchAllTieExempt.filter(id => id !== pid);
    delete matchHandicaps[pid];
    const hcEl = document.getElementById(`matchHc_${pid}`);
    if (hcEl) hcEl.style.display = 'none';
  } else {
    if(selectedPlayers.length >= 4) { showToast('⚠️ 최대 4명까지 선택 가능합니다'); return; }
    selectedPlayers.push(pid);
    label.style.background = 'rgba(74,140,92,0.1)';

    matchHandicaps[pid] = player?.handicap ?? null;

function toggleMatchMode(mode) {
  matchBetMode = mode;
  const labels = { diff: '타수차', skin: '스킨', friendly: '친선전' };
  document.querySelectorAll('#matchBetModeToggle .toggle-btn').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.trim() === labels[mode]);
  });
  const friendly = mode === 'friendly';
  const amountSection = document.getElementById('matchAmountSection');
  const bonusSection = document.getElementById('matchBonusSection');
  if (amountSection) amountSection.style.display = friendly ? 'none' : '';
  if (bonusSection) bonusSection.style.display = friendly ? 'none' : '';
}

function toggleMatchBonus(type) {
  if (type === 'birdie') {
    matchBirdieBonus = !matchBirdieBonus;
    if (!matchBirdieBonus) matchBirdieExempt = [];
    const btn = document.getElementById('bonusBirdieBtn');
    if (btn) {
      btn.style.borderColor = matchBirdieBonus ? 'var(--gold)' : 'var(--border)';
      btn.style.background = matchBirdieBonus ? 'rgba(212,168,67,0.12)' : 'var(--white)';
      btn.style.color = matchBirdieBonus ? 'var(--gold)' : 'var(--text-mid)';
    }
  } else if (type === 'doublePar') {
    matchDoubleParBonus = !matchDoubleParBonus;
    if (!matchDoubleParBonus) matchDoubleParExempt = [];
    const btn = document.getElementById('bonusDoubleParBtn');
    if (btn) {
      btn.style.borderColor = matchDoubleParBonus ? '#c0392b' : 'var(--border)';
      btn.style.background = matchDoubleParBonus ? 'rgba(192,57,43,0.1)' : 'var(--white)';
      btn.style.color = matchDoubleParBonus ? '#c0392b' : 'var(--text-mid)';
    }
  } else if (type === 'allTie') {
    matchAllTieDouble = !matchAllTieDouble;
    if (!matchAllTieDouble) matchAllTieExempt = [];
    const btn = document.getElementById('bonusAllTieBtn');
    if (btn) {
      btn.style.borderColor = matchAllTieDouble ? '#2980b9' : 'var(--border)';

      btn.style.color = matchAllTieDouble ? '#2980b9' : 'var(--text-mid)';

  }
  refreshBonusExemptSection();
}

function refreshBonusExemptSection() {
  const section = document.getElementById('bonusExemptSection');
  if (!section) return;

  const hasBonus = matchBirdieBonus || matchDoubleParBonus || matchAllTieDouble;
  const players = selectedPlayers.map(pid => state.players.find(p => p.id === pid)).filter(Boolean);

  if (!hasBonus || players.length === 0) {
    section.style.display = 'none';
    return;
  }

  const makeChips = (exemptList, type, color) =>
    players.map(p => {
      const isExempt = exemptList.includes(p.id);
      return `<button onclick="toggleBonusExempt('${type}','${p.id}')" id="exemptChip_${type}_${p.id}"
        style="padding:4px 10px;border-radius:20px;border:1.5px solid ${isExempt ? color : 'var(--border)'};
               background:${isExempt ? color+'22' : 'var(--white)'};color:${isExempt ? color : 'var(--text-mid)'};
               font-size:12px;font-weight:${isExempt ? '700' : '400'};cursor:pointer;transition:all 0.15s">
        ${p.name}
      </button>`;
    }).join('');

  let html = `<div style="font-size:12px;font-weight:700;color:var(--text-mid);margin-bottom:8px">🚫 보너스 예외 설정</div>`;

  if (matchBirdieBonus) {
    html += `<div style="margin-bottom:${matchDoubleParBonus ? '10px' : '0'}">
      <div style="font-size:11px;color:var(--gold);font-weight:600;margin-bottom:5px">🦅 버디 ×2 예외</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">${makeChips(matchBirdieExempt, 'birdie', 'var(--gold)')}</div>
    </div>`;
  }
  if (matchDoubleParBonus) {
    html += `<div>
      <div style="font-size:11px;color:#c0392b;font-weight:600;margin-bottom:5px">💀 더블파 ×2 예외</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">${makeChips(matchDoubleParExempt, 'doublePar', '#c0392b')}</div>
    </div>`;
  }

  if (matchAllTieDouble) {
    html += `<div style="margin-top:${(matchBirdieBonus||matchDoubleParBonus)?'10px':'0'}">
      <div style="font-size:11px;color:#2980b9;font-weight:600;margin-bottom:5px">🤝 올타이 ×2 예외</div>
      <div style="display:flex;flex-wrap:wrap;gap:5px">${makeChips(matchAllTieExempt, 'allTie', '#2980b9')}</div>
    </div>`;
  }
  html += `<div style="font-size:11px;color:var(--text-light);margin-top:7px">선택된 플레이어는 해당 규칙의 지불에서 제외됩니다</div>`;

  section.innerHTML = html;
  section.style.display = 'block';
}

function toggleBonusExempt(type, pid) {
  const list = type === 'birdie' ? matchBirdieExempt : type === 'doublePar' ? matchDoubleParExempt : matchAllTieExempt;
  const idx = list.indexOf(pid);
  if (idx >= 0) list.splice(idx, 1);
  else list.push(pid);

}

function createMatch() {
  const course = document.getElementById('newMatchCourse')?.value?.trim();
  if(!course) { showToast('⚠️ 코스명을 입력하세요'); return; }
  if(selectedPlayers.length < 2) { showToast('⚠️ 2명 이상 선택하세요'); return; }

  const date = document.getElementById('newMatchDate')?.value || new Date().toISOString().split('T')[0];
  const amount = Number(document.getElementById('newMatchAmount')?.value) || state.settings.baseAmount;

  // 모달에서 입력된 핸디 읽기 (입력 필드에서 최신값 반영)
  selectedPlayers.forEach(pid => {
    const el = document.getElementById(`matchHc_${pid}`);
    if (el) matchHandicaps[pid] = el.value !== '' ? Number(el.value) : null;
  });

  const match = {
    id: uid(),
    date,
    course,
    playerIds: [...selectedPlayers],
    handicaps: Object.fromEntries(selectedPlayers.map(pid => [pid, matchHandicaps[pid] ?? null])),
    bettingRule: { mode: matchBetMode, baseAmount: amount, birdieBonus: matchBirdieBonus, doubleParBonus: matchDoubleParBonus, allTieDouble: matchAllTieDouble, birdieExempt: [...matchBirdieExempt], doubleParExempt: [...matchDoubleParExempt], allTieExempt: [...matchAllTieExempt] },
    scores: {},
    done: false
  };

  selectedPlayers.forEach(pid => { match.scores[pid] = [...state.settings.par]; });
  state.matches.push(match);
  state.activeMatchId = match.id;
  state.activeHole = 0;
  selectedPlayers = [];
  saveState();
  closeModalForce();
  showToast(`⛳ ${course} 경기 시작!`);
  state.currentTab = 'scorecard';
  render();
}

          <div style="width:30px;height:30px;border-radius:50%;background:${COLOR_HEX[ci]};display:flex;align-items:center;justify-content:center;color:white;font-family:'Black Han Sans',sans-serif;font-size:13px;flex-shrink:0">${player?.name[0]||'?'}</div>
          <span style="flex:1;font-weight:600;font-size:14px">${player?.name||'?'}</span>
          <input type="number" id="matchHc_${pid}" placeholder="핸디" min="0" max="54" step="0.1"
            value="${hcVal}"
            style="width:70px;padding:6px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px;text-align:center"
            oninput="matchHandicaps['${pid}']=this.value!==''?Number(this.value):null">
        </div>`;
      }).join('')}
    </div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <button class="btn btn-full" onclick="deleteMatchConfirm('${id}')"
        style="flex:1;background:#fef2f2;color:#c0392b;border:1.5px solid #c0392b;font-weight:700;padding:13px">
        🗑 삭제
      </button>
      <button class="btn btn-gold btn-full" onclick="saveMatchEdit()" style="flex:2;font-size:16px;padding:13px">
        저장
      </button>
    </div>
  `);
  refreshBonusExemptSection();
}

function saveMatchEdit() {
  const m = state.matches.find(x => x.id === editingMatchId);
  if(!m) return;
  const course = document.getElementById('editMatchCourse')?.value?.trim();
  if(!course) { showToast('⚠️ 코스명을 입력하세요'); return; }
  const date = document.getElementById('editMatchDate')?.value || m.date;
  const amount = Number(document.getElementById('editMatchAmount')?.value) || (m.bettingRule?.baseAmount ?? state.settings.baseAmount);

  // 핸디 입력값 최신화
  m.playerIds.forEach(pid => {
    const el = document.getElementById(`matchHc_${pid}`);
    if (el) matchHandicaps[pid] = el.value !== '' ? Number(el.value) : null;
  });

  m.course = course;
  m.date = date;
  m.handicaps = Object.fromEntries(m.playerIds.map(pid => [pid, matchHandicaps[pid] ?? null]));
  m.bettingRule = {
    ...m.bettingRule,
    mode: matchBetMode,
    baseAmount: amount,
    birdieBonus: matchBirdieBonus,
    doubleParBonus: matchDoubleParBonus,
    allTieDouble: matchAllTieDouble,
    birdieExempt: [...matchBirdieExempt],
    doubleParExempt: [...matchDoubleParExempt],
    allTieExempt: [...matchAllTieExempt]
  };

  saveState();
  closeModalForce();
  showToast('✅ 경기 수정 완료!');
  renderMatches();
}

function deleteMatchConfirm(id) {
  if(!confirm('경기를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) return;
  state.matches = state.matches.filter(m => m.id !== id);
  if(state.activeMatchId === id) state.activeMatchId = null;
  saveState();
  closeModalForce();
  showToast('🗑 경기 삭제 완료');
  renderMatches();
}

// ================================================================
// 설정 / 데이터
// ================================================================

function exportData() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `screengolf_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  showToast('✅ 내보내기 완료');
}

function importData(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const data = JSON.parse(ev.target.result);
      if(!data.players || !data.matches) throw new Error('invalid');
      if(!confirm('기존 데이터를 덮어씁니까?')) return;
      Object.assign(state, data);
      saveState();
      render();
      showToast('✅ 불러오기 완료');
    } catch(err) { showToast('❌ 올바른 파일이 아닙니다'); }
  };
  reader.readAsText(file);
}

function resetAll() {
  if(!confirm('정말로 모든 데이터를 삭제하시겠습니까?\n이 작업은 되돌릴 수 없습니다.')) return;
  localStorage.removeItem('sgApp');
  location.reload();
}

// ================================================================
// 유틸
// ================================================================

function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function formatDate(d) {
  if(!d) return '';
  const dt = new Date(d);
  return `${dt.getFullYear()}년 ${dt.getMonth()+1}월 ${dt.getDate()}일`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ================================================================
// 초기화
// ================================================================

// 샘플 데이터 (처음 실행 시)
if(!state.players.length && !state.matches.length) {
  state.players = [
    { id: 'p1', name: '김민준', handicap: 5 },
    { id: 'p2', name: '이서연', handicap: null },
    { id: 'p3', name: '박도윤', handicap: 12 },
    { id: 'p4', name: '최하은', handicap: 8 },
  ];

  // 샘플 경기 (일부 스코어 입력된 상태)
  const sampleScores = {
    p1: [4,3,5,4,4,3,5,4,4,  4,3,5,4,4,3,5,4,4],
    p2: [5,4,4,5,3,4,4,5,5,  5,4,4,5,3,4,4,5,5],
    p3: [4,4,4,4,4,4,4,4,4,  4,4,4,4,4,4,4,4,4],
    p4: [3,3,5,4,5,3,5,3,4,  3,3,5,4,5,3,5,3,4],
  };

  state.matches = [{
    id: 'm1',
    date: new Date().toISOString().split('T')[0],
    course: '파인밸리 CC',
    playerIds: ['p1','p2','p3','p4'],
    bettingRule: { mode: 'diff', baseAmount: 1000 },
    scores: sampleScores,
    done: false
  }];

  state.activeMatchId = 'm1';
  saveState();

render();
document.getElementById('appVersionBadge').textContent = APP_VERSION;
</script>
